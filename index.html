<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabula - Mapa Reklam</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #f4f7f6; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .controls { 
            position: fixed; top: 20px; left: 20px; z-index: 1000; 
            background: white; padding: 15px; border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); width: 220px;
        }

        .geo-main-btn {
            background: #2ecc71; color: white; border: none; padding: 12px;
            border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px;
            width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-bottom: 10px;
        }
        .geo-main-btn:hover { background: #27ae60; }

        .logo-btn {
            font-size: 22px; font-weight: bold; cursor: pointer; color: #2c3e50;
            text-align: center; padding: 10px 0; border-top: 1px solid #eee;
        }
        .logo-btn:hover { color: #3498db; }

        .admin-section { display: none; border-top: 2px solid #3498db; padding-top: 15px; margin-top: 5px; }
        
        #fileInput { display: none; }
        .custom-file-upload {
            display: block; background: #ecf0f1; color: #7f8c8d; padding: 12px;
            text-align: center; border-radius: 6px; cursor: pointer; border: 2px dashed #bdc3c7;
            margin-bottom: 10px; font-size: 13px; font-weight: bold;
        }
        .custom-file-upload.selected { background: #dff0d8; color: #3c763d; border-color: #d6e9c6; }

        select, button.action-btn { width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; }
        
        button.action-btn { background: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; }
        button.export-btn { background: #f39c12; color: white; border: none; font-weight: bold; margin-top: 5px; }
        button.logout-btn { background: #e74c3c; color: white; border: none; font-size: 11px; padding: 8px; margin-top: 10px; cursor: pointer; border-radius: 4px; width: 100%; }

        /* Przesunięcie przycisków Zoom pod panel */
        .leaflet-top.leaflet-left { margin-top: 240px !important; }

        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 2000; justify-content: center; align-items: center;
            font-weight: bold; flex-direction: column; gap: 10px;
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader">
    <div id="loaderStatus">Wysyłanie danych... 🚀</div>
</div>

<div class="controls">
    <button class="geo-main-btn" onclick="locateUser()">🎯 Moja lokalizacja</button>
    <div class="logo-btn" onclick="checkLoginState()">Tabula 📍</div>
    
    <div id="adminPanel" class="admin-section">
        <label for="fileInput" class="custom-file-upload" id="fileLabel">📷 Wybierz zdjęcia (wiele)</label>
        <input type="file" id="fileInput" accept="image/*" multiple onchange="updateFileName(this)">
        
        <select id="categorySelect">
            <option value="Billboard">Billboard</option>
            <option value="Graffiti">Graffiti / Plakat</option>
            <option value="Słup/Latarnia">Reklama na słupie</option>
            <option value="Inne">Inne</option>
        </select>
        
        <button class="action-btn" onclick="uploadPhoto()">Dodaj zgłoszenia</button>
        <button class="export-btn action-btn" onclick="exportToCSV()">Eksportuj CSV</button>
        <button class="logout-btn" onclick="logout()">Wyloguj</button>
    </div>
</div>

<div id="map"></div>

<script>
    const SUPABASE_URL = 'https://gvzkprcvxsfdbxekjsgo.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_rVWiFQTjEAhmfm-SnQDMKw_QwspssLx';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const map = L.map('map').setView([50.012, 20.019], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const markers = L.markerClusterGroup();
    map.addLayer(markers);

    function updateFileName(input) {
        const label = document.getElementById('fileLabel');
        if (input.files.length > 0) {
            label.innerText = `✅ Wybrano: ${input.files.length} szt.`;
            label.classList.add('selected');
        }
    }

    async function loadMarkers() {
        const { data, error } = await supabaseClient.from('photos').select('*');
        if (error) return;
        markers.clearLayers();
        data.forEach(p => {
            const d = p.created_at ? new Date(p.created_at).toLocaleString() : 'Brak daty';
            L.marker([p.lat, p.lng]).bindPopup(`<div style="width:180px"><img src="${p.url}" style="width:100%; border-radius:8px"><p><b>${p.category}</b></p><small>${d}</small></div>`).addTo(markers);
        });
    }

    function locateUser() { map.locate({setView: true, maxZoom: 16}); }
    map.on('locationfound', (e) => {
        L.circle(e.latlng, e.accuracy).addTo(map);
        L.marker(e.latlng).addTo(map).bindPopup("Jesteś tutaj").openPopup();
    });

    async function checkLoginState() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            document.getElementById('adminPanel').style.display = 'block';
        } else {
            const email = prompt("E-mail:");
            const pass = prompt("Hasło:");
            if (email && pass) {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
                if (error) alert("Błąd!"); else location.reload();
            }
        }
    }

    async function logout() { await supabaseClient.auth.signOut(); location.reload(); }

    async function exportToCSV() {
        const { data, error } = await supabaseClient.from('photos').select('*');
        if (error) return;
        let csv = "ID,Data,Kategoria,Lat,Lng,URL\n";
        data.forEach(r => csv += `${r.id},${r.created_at},${r.category},${r.lat},${r.lng},${r.url}\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", "mapa_tabula.csv");
        link.click();
    }

    // GŁÓWNA FUNKCJA MULTI-UPLOADU
    async function uploadPhoto() {
        const fileInput = document.getElementById('fileInput');
        const files = fileInput.files;
        const category = document.getElementById('categorySelect').value;

        if (files.length === 0) return alert("Wybierz zdjęcia!");
        
        const loader = document.getElementById('loader');
        const loaderStatus = document.getElementById('loaderStatus');
        loader.style.display = 'flex';

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                loaderStatus.innerText = `Przetwarzanie ${i + 1} z ${files.length}... ⏳`;

                // 1. Wyciąganie daty EXIF dla każdego pliku
                let photoDate = null;
                try {
                    photoDate = await new Promise((res) => {
                        EXIF.getData(file, function() {
                            const dt = EXIF.getTag(this, "DateTimeOriginal");
                            if (dt) { 
                                const p = dt.split(" "); 
                                res(p[0].replace(/:/g, "-") + "T" + p[1]); 
                            } else res(null);
                        });
                    });
                } catch (e) { console.error("Błąd EXIF", e); }

                // 2. Upload do Storage
                const name = `${Date.now()}_${i}_${file.name}`;
                const { error: upErr } = await supabaseClient.storage.from('photos').upload(name, file);
                
                if (!upErr) {
                    const { data: { publicUrl } } = supabaseClient.storage.from('photos').getPublicUrl(name);

                    // 3. Zapis do Bazy
                    await supabaseClient.from('photos').insert([{ 
                        url: publicUrl, lat, lng, category, created_at: photoDate 
                    }]);
                } else {
                    console.error("Błąd pliku:", upErr.message);
                }
            }

            loader.style.display = 'none';
            alert(`Dodano pomyślnie ${files.length} zdjęć!`);
            location.reload();
        }, () => { 
            alert("Błąd GPS!"); 
            loader.style.display = 'none'; 
        }, { enableHighAccuracy: true });
    }

    loadMarkers();
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
        if (session) document.getElementById('adminPanel').style.display = 'block';
    });
</script>
</body>
</html>
