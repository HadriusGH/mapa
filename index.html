<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapa Przygód</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #map { height: 100vh; width: 100%; z-index: 1; background: #e0e0e0; }
        
        /* Mini Panel Sterowania */
        .controls { 
            position: fixed; top: 10px; left: 10px; z-index: 1000; 
            background: rgba(255,255,255,0.95); padding: 6px; border-radius: 10px; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 6px;
            backdrop-filter: blur(4px); border: 1px solid rgba(0,0,0,0.1);
        }

        .top-bar { display: flex; gap: 6px; align-items: center; }

        .geo-btn {
            background: #2ecc71; color: white; border: none; padding: 8px 14px;
            border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px;
            transition: background 0.2s;
        }

        .admin-trigger {
            background: #34495e; color: white; border: none; width: 34px; height: 34px;
            border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }

        .filter-select {
            width: 100%; font-size: 11px; padding: 5px; border-radius: 5px; border: 1px solid #ccc;
            background: white; cursor: pointer; color: #333;
        }

        /* Sekcja Admina */
        .admin-section { 
            display: none; border-top: 1px solid #eee; padding-top: 10px; 
            width: 190px; flex-direction: column; 
        }
        
        #fileInput { display: none; }
        .custom-file-upload {
            display: block; background: #f8f9fa; padding: 10px; text-align: center;
            border-radius: 6px; cursor: pointer; font-size: 11px; margin-bottom: 6px;
            border: 1px dashed #adb5bd; color: #495057;
        }
        .custom-file-upload.selected { background: #d4edda; border-color: #28a745; color: #155724; }

        .admin-input, .action-btn { width: 100%; margin-bottom: 6px; padding: 8px; border-radius: 6px; border: 1px solid #ddd; font-size: 12px; }
        .action-btn { background: #3498db; color: white; border: none; font-weight: bold; cursor: pointer; }
        .export-btn { background: #f39c12; }
        .logout-btn { background: #e74c3c; color: white; border: none; font-size: 10px; padding: 6px; margin-top: 4px; cursor: pointer; border-radius: 4px; }

        /* Loader */
        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.85); z-index: 2000; justify-content: center; align-items: center;
            font-size: 14px; font-weight: bold; flex-direction: column; gap: 10px;
        }

        /* Popupy */
        .leaflet-popup-content img { width: 100%; border-radius: 5px; margin-top: 5px; }
        .leaflet-top.leaflet-left { margin-top: 130px !important; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader">
    <div id="loaderStatus">Przetwarzanie zdjęć...</div>
</div>

<div class="controls">
    <div class="top-bar">
        <button class="geo-btn" onclick="locateUser()">🎯 Lokalizuj</button>
        <button class="admin-trigger" onclick="checkLoginState()">👤</button>
    </div>
    
    <select id="mapFilter" class="filter-select" onchange="applyFilter()">
        <option value="all">Pokaż wszystko (Trasa)</option>
        <option value="Kraków i okolice">Kraków i okolice</option>
        <option value="Beskidy">Beskidy</option>
        <option value="Gorce">Gorce</option>
        <option value="Tatry">Tatry</option>
        <option value="Bałtyk">Bałtyk</option>
        <option value="Inne">Inne</option>
    </select>
    
    <div id="adminPanel" class="admin-section">
        <label for="fileInput" class="custom-file-upload" id="fileLabel">📷 Wybierz zdjęcia z EXIF</label>
        <input type="file" id="fileInput" accept="image/*" multiple onchange="updateFileName(this)">
        
        <select id="categorySelect" class="admin-input">
            <option value="Kraków i okolice">Kraków i okolice</option>
            <option value="Beskidy">Beskidy</option>
            <option value="Gorce">Gorce</option>
            <option value="Tatry">Tatry</option>
            <option value="Bałtyk">Bałtyk</option>
            <option value="Inne">Inne</option>
        </select>
        
        <button class="action-btn" onclick="uploadPhoto()">Wyślij na mapę</button>
        <button class="action-btn export-btn" onclick="exportToCSV()">Eksportuj dane</button>
        <button class="logout-btn" onclick="logout()">Wyloguj</button>
    </div>
</div>

<div id="map"></div>

<script>
    // Konfiguracja Supabase
    const SUPABASE_URL = 'https://gvzkprcvxsfdbxekjsgo.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_rVWiFQTjEAhmfm-SnQDMKw_QwspssLx';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Inicjalizacja Mapy
    const map = L.map('map').setView([52.0, 19.0], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    const markers = L.markerClusterGroup();
    map.addLayer(markers);

    let allPhotosData = [];
    let routeLine = null;

    function updateFileName(input) {
        const label = document.getElementById('fileLabel');
        if (input.files.length > 0) {
            label.innerText = `✅ Wybrano: ${input.files.length}`;
            label.classList.add('selected');
        }
    }

    function convertDMSToDD(deg, min, sec, dir) {
        let dd = deg + min / 60 + sec / 3600;
        return (dir === "S" || dir === "W") ? dd * -1 : dd;
    }

    // Pobieranie danych i rysowanie trasy chronologicznie
    async function loadMarkers() {
        const { data, error } = await supabaseClient.from('photos').select('*');
        if (error) return console.error(error);
        
        // Kluczowe: Sortowanie po dacie EXIF z bazy
        allPhotosData = data.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
        
        renderMarkers('all');
    }

    function renderMarkers(categoryFilter) {
        markers.clearLayers();
        if (routeLine) map.removeLayer(routeLine);

        const latLngs = [];

        allPhotosData.forEach(p => {
            if (categoryFilter === 'all' || p.category === categoryFilter) {
                const dateObj = p.created_at ? new Date(p.created_at) : null;
                const dateStr = dateObj ? dateObj.toLocaleString('pl-PL') : 'Brak daty EXIF';
                
                const pos = [p.lat, p.lng];
                latLngs.push(pos);

                const marker = L.marker(pos);
                marker.bindPopup(`
                    <div style="width:160px; font-size:11px;">
                        <a href="${p.url}" target="_blank"><img src="${p.url}" title="Powiększ"></a>
                        <p style="margin:8px 0 4px 0"><b>📍 ${p.category}</b></p>
                        <small>📅 ${dateStr}</small>
                    </div>
                `);
                markers.addLayer(marker);
            }
        });
    }

    function applyFilter() {
        renderMarkers(document.getElementById('mapFilter').value);
    }

    function locateUser() { map.locate({setView: true, maxZoom: 15}); }
    map.on('locationfound', (e) => {
        L.circle(e.latlng, e.accuracy).addTo(map);
        L.marker(e.latlng).addTo(map).bindPopup("Twoja pozycja").openPopup();
    });

    // Zarządzanie panelem admina
    async function checkLoginState() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        const panel = document.getElementById('adminPanel');
        if (session) {
            panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
        } else {
            const email = prompt("E-mail admina:");
            const pass = prompt("Hasło:");
            if (email && pass) {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
                if (error) alert("Błąd logowania!"); else location.reload();
            }
        }
    }

    async function logout() { await supabaseClient.auth.signOut(); location.reload(); }

    async function exportToCSV() {
        const { data } = await supabaseClient.from('photos').select('*');
        let csv = "ID,Data_EXIF,Kategoria,Lat,Lng,URL\n";
        data.forEach(r => csv += `${r.id},${r.created_at},${r.category},${r.lat},${r.lng},${r.url}\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", "wyjazdy_tabula.csv");
        link.click();
    }

    // Wysyłanie zdjęć z priorytetem EXIF
    async function uploadPhoto() {
        const fileInput = document.getElementById('fileInput');
        const files = fileInput.files;
        const category = document.getElementById('categorySelect').value;

        if (files.length === 0) return alert("Wybierz pliki!");
        
        document.getElementById('loader').style.display = 'flex';
        const status = document.getElementById('loaderStatus');

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            status.innerText = `Przetwarzanie ${i+1}/${files.length}: ${file.name}`;

            let exifData = await new Promise(res => {
                EXIF.getData(file, function() {
                    const dt = EXIF.getTag(this, "DateTimeOriginal");
                    const lat = EXIF.getTag(this, "GPSLatitude");
                    const latRef = EXIF.getTag(this, "GPSLatitudeRef");
                    const lng = EXIF.getTag(this, "GPSLongitude");
                    const lngRef = EXIF.getTag(this, "GPSLongitudeRef");
                    
                    let formattedDate = null;
                    if (dt) {
                        const p = dt.split(" ");
                        formattedDate = p[0].replace(/:/g, "-") + "T" + p[1];
                    }

                    res({
                        date: formattedDate,
                        lat: lat ? convertDMSToDD(lat[0], lat[1], lat[2], latRef) : null,
                        lng: lng ? convertDMSToDD(lng[0], lng[1], lng[2], lngRef) : null
                    });
                });
            });

            if (!exifData.lat) {
                console.warn("Pominięto brak GPS w: " + file.name);
                continue;
            }

            const fileName = `${Date.now()}_${file.name}`;
            const { error: storageErr } = await supabaseClient.storage.from('photos').upload(fileName, file);

            if (!storageErr) {
                const { data: { publicUrl } } = supabaseClient.storage.from('photos').getPublicUrl(fileName);
                await supabaseClient.from('photos').insert([{ 
                    url: publicUrl, 
                    lat: exifData.lat, 
                    lng: exifData.lng, 
                    category: category, 
                    created_at: exifData.date 
                }]);
            }
        }
        location.reload();
    }

    // Start aplikacji
    loadMarkers();
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
        if (session) document.getElementById('adminPanel').style.display = 'none';
    });
</script>
</body>
</html>
