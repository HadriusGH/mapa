<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tabula - Mapa Reklam</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #f4f7f6; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        /* Panel sterowania */
        .controls { 
            position: fixed; top: 10px; left: 10px; z-index: 1000; 
            background: white; padding: 10px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 200px;
            display: flex; flex-direction: column; gap: 8px;
        }

        /* Przycisk Lokalizacji na samej górze */
        .geo-main-btn {
            background: #2ecc71; color: white; border: none; padding: 12px;
            border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .geo-main-btn:hover { background: #27ae60; }

        /* Logo / Przycisk Logowania */
        .logo-btn {
            margin: 0; font-size: 20px; cursor: pointer; color: #2c3e50;
            text-align: center; padding: 5px; border: 1px transparent solid;
        }
        .logo-btn:hover { color: #3498db; }

        /* Sekcja Admina */
        .admin-section { display: none; border-top: 2px solid #eee; padding-top: 10px; }
        
        /* Ukrycie brzydkiego napisu "Nie wybrano pliku" */
        #fileInput { display: none; }
        .custom-file-upload {
            display: block; background: #95a5a6; color: white; padding: 10px;
            text-align: center; border-radius: 6px; cursor: pointer; margin-bottom: 8px; font-size: 14px;
        }

        select, button.action-btn { width: 100%; margin-bottom: 8px; padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; }
        
        button.action-btn { background: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; }
        button.export-btn { background: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
        button.logout-btn { background: #e74c3c; color: white; border: none; font-size: 10px; padding: 5px; margin-top: 5px; cursor: pointer; width: 100%; border-radius: 4px; }

        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 2000; justify-content: center; align-items: center;
            font-weight: bold;
        }

        /* Przesunięcie przycisków zoomu Leaflet, żeby nie kolidowały z panelem */
        .leaflet-top.leaflet-left { top: 180px; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader">Przetwarzanie... ⏳</div>

<div class="controls">
    <button class="geo-main-btn" onclick="locateUser()">🎯 Moja lokalizacja</button>
    
    <div class="logo-btn" onclick="checkLoginState()">Tabula 📍</div>
    
    <div id="adminPanel" class="admin-section">
        <label for="fileInput" class="custom-file-upload">📷 Wybierz / Zrób zdjęcie</label>
        <input type="file" id="fileInput" accept="image/*" capture="camera" onchange="updateFileName(this)">
        
        <select id="categorySelect">
            <option value="Billboard">Billboard</option>
            <option value="Graffiti">Graffiti / Plakat</option>
            <option value="Słup/Latarnia">Reklama na słupie</option>
            <option value="Inne">Inne</option>
        </select>
        
        <button class="action-btn" onclick="uploadPhoto()">Dodaj zgłoszenie</button>
        <button class="export-btn action-btn" onclick="exportToCSV()">Pobierz CSV</button>
        <button class="logout-btn" onclick="logout()">Wyloguj</button>
    </div>
</div>

<div id="map"></div>

<script>
    const SUPABASE_URL = 'https://gvzkprcvxsfdbxekjsgo.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_rVWiFQTjEAhmfm-SnQDMKw_QwspssLx';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const map = L.map('map', { zoomControl: true }).setView([50.012, 20.019], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const markers = L.markerClusterGroup();
    map.addLayer(markers);

    function updateFileName(input) {
        const label = document.querySelector('.custom-file-upload');
        if (input.files.length > 0) label.innerText = "✅ Zdjęcie wybrane";
    }

    async function loadMarkers() {
        const { data, error } = await supabaseClient.from('photos').select('*');
        if (error) return;
        markers.clearLayers();
        data.forEach(photo => {
            const dateStr = photo.created_at ? new Date(photo.created_at).toLocaleString() : 'Brak daty';
            const marker = L.marker([photo.lat, photo.lng]);
            marker.bindPopup(`<div style="width:180px"><img src="${photo.url}" style="width:100%; border-radius:8px"><p><b>${photo.category}</b></p><small>${dateStr}</small></div>`);
            markers.addLayer(marker);
        });
    }

    function locateUser() {
        map.locate({setView: true, maxZoom: 16});
    }

    map.on('locationfound', (e) => {
        L.circle(e.latlng, e.accuracy).addTo(map);
        L.marker(e.latlng).addTo(map).bindPopup("Jesteś tutaj").openPopup();
    });

    async function checkLoginState() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            document.getElementById('adminPanel').style.display = 'block';
        } else {
            const email = prompt("E-mail:");
            const password = prompt("Hasło:");
            if (!email || !password) return;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert("Błąd!"); else location.reload();
        }
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        location.reload();
    }

    async function exportToCSV() {
        const { data, error } = await supabaseClient.from('photos').select('*');
        if (error) return;
        let csv = "ID,Data,Kategoria,Lat,Lng,URL\n";
        data.forEach(r => csv += `${r.id},${r.created_at},${r.category},${r.lat},${r.lng},${r.url}\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", "tabula_export.csv");
        link.click();
    }

    async function uploadPhoto() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return alert("Brak zdjęcia!");
        document.getElementById('loader').style.display = 'flex';

        let photoDate = null;
        try {
            photoDate = await new Promise((res) => {
                EXIF.getData(file, function() {
                    const dt = EXIF.getTag(this, "DateTimeOriginal");
                    if (dt) { const p = dt.split(" "); res(p[0].replace(/:/g, "-") + "T" + p[1]); }
                    else res(null);
                });
            });
        } catch (e) {}

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const fileName = `${Date.now()}_${file.name}`;
            await supabaseClient.storage.from('photos').upload(fileName, file);
            const { data: { publicUrl } } = supabaseClient.storage.from('photos').getPublicUrl(fileName);
            await supabaseClient.from('photos').insert([{ 
                url: publicUrl, lat: pos.coords.latitude, lng: pos.coords.longitude, 
                category: document.getElementById('categorySelect').value, created_at: photoDate 
            }]);
            location.reload();
        }, () => { alert("Błąd GPS"); document.getElementById('loader').style.display = 'none'; });
    }

    loadMarkers();
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
        if (session) document.getElementById('adminPanel').style.display = 'block';
    });
</script>
</body>
</html>
